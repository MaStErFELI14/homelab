hostPort:
  enabled: false
  port: 8123
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 768Mi
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
  - host: hass.beaners.club
    paths:
    - path: /
      pathType: Prefix
  tls:
  - secretName: home-assistant-tls
    hosts:
    - hass.beaners.club
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: local-path
configuration:
  enabled: true
  forceInit: true
  trusted_proxies:
  - 10.0.0.0/8
  - 192.168.0.0/16
  templateConfig: |-
    default_config:

    {{- if .Values.ingress.enabled }}
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        {{- range .Values.configuration.trusted_proxies }}
        - {{ . }}
        {{- end }}
    {{- end}}

    automation: !include automations.yaml
