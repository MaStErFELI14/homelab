# Minimal values for Home Assistant Matter Server

image:
  pullPolicy: IfNotPresent
  tag: "8.1.0b0"

# Required by the chart; adjust to your node interface (e.g., eth0, enp1s0).
networkInterface: enp0s25

bluetoothCommissioning:
  enabled: false

service:
  type: ClusterIP
  port: 5580

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: matter.beaners.club
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: matter-server-tls
      hosts:
        - matter.beaners.club

persistence:
  storageClassName: local-path
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

podAnnotations:
  reloader.stakater.com/auto: "true"
